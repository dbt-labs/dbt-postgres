name: "Publish"

on:
    workflow_dispatch:
        inputs:
            deploy-to:
                description: "Choose whether to deploy to test or prod"
                type: environment
                default: "prod"
            branch:
                description: "Choose the branch to publish"
                type: string
                default: "main"
            pypi-internal:
                description: "Publish to internal PyPI"
                type: boolean
                default: true
            pypi-public:
                description: "Publish to PyPI"
                type: boolean
                default: false

# don't attempt to release the same target in parallel
concurrency:
    group: ${{ github.workflow }}-${{ inputs.deploy-to }}
    cancel-in-progress: true

env:
    package: "dbt-postgres"

jobs:
    unit-tests:
        uses: dbt-labs/dbt-adapters/.github/workflows/_unit-tests.yml@monorepo-prep
        with:
            package: ${{ env.package }}
            branch: ${{ inputs.branch }}

    integration-tests:
        uses: ./.github/workflows/_integration-tests.yml
        with:
            package: ${{ env.package }}
            branch: ${{ inputs.branch }}
        secrets: inherit

    generate-changelog:
        uses: dbt-labs/dbt-adapter./.github/workflows/_generate-changelog.yml@monorepo-prep
        with:
            package: ${{ env.package }}
            deploy-to: ${{ inputs.deploy-to }}
            branch: ${{ inputs.branch }}
        secrets: inherit

    publish-internal:
        if: ${{ inputs.pypi-internal == true }}
        needs: [unit-tests, integration-tests]
        uses: dbt-labs/dbt-adapters/.github/workflows/_publish-internal.yml@monorepo-prep
        with:
            package: ${{ env.package }}
            deploy-to: ${{ inputs.deploy-to }}
            branch: ${{ inputs.branch }}
        secrets: inherit

    publish-pypi:
        if: ${{ inputs.pypi-public == true }}
        needs: [unit-tests, integration-tests]
        uses: dbt-labs/dbt-adapters/.github/workflows/_publish-pypi.yml@monorepo-prep
        with:
            package: ${{ env.package }}
            deploy-to: ${{ inputs.deploy-to }}
            branch: ${{ inputs.branch }}
